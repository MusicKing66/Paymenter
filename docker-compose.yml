x-common:
  database: &db-environment
    # Set these in the root .env file on the server.
    MYSQL_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
    MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}"

services:
  database:
    image: mariadb:lts
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "./database:/var/lib/mysql"
    environment:
      <<: *db-environment
      MYSQL_DATABASE: "${DB_DATABASE:-paymenter}"
      MYSQL_USER: "${DB_USERNAME:-paymenter}"

  cache:
    image: redis:alpine
    restart: always

  paymenter:
    build:
      context: .
    restart: always
    depends_on:
      - database
      - cache
    ports:
      - "${PAYMENTER_HTTP_PORT:-3000}:80"
    env_file:
      - .env
    volumes:
      - "./.env:/app/var/.env"
      - "./storage:/app/storage"
      - "./themes:/app/themes"
      - "./extensions:/app/extensions"
